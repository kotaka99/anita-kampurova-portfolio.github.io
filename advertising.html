<!DOCTYPE html>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Anita Kamburova - Portfolio</title>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap');
		* {
			
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body {
				font-family: "Crimson Text", serif;
				background: #f5f5f5;
				color: #222;
				display: flex;
				min-height: 100vh;
		}
		
		img {
			image-rendering: auto;
			-webkit-backface-visibility: hidden;
			backface-visibility: hidden;
		}
		
		.sidebar {
			width: 260px;
			background: #efefef;
			padding: 50px 35px;
			position: fixed;
			top: 0;
			left: 0;
			height: 100vh;
			overflow-y: auto;
			//flex-direction: column;
			//justify-content: flex-start;
		}
		
		.sidebar h1 {
			font-family: "Crimson Text", serif;
			font-size: 34px;
			font-weight: 500;
			line-height: 1.1;
			margin-bottom: 50px;
		}
		
		.about, .cv {
			display: block;
			text-decoration: none;
			font-weight: 600;
			font-size: 16px;
			color: black;
			margin: 8px 0;

			transition: color 0.2s ease;
		}
		
		.about:hover, .cv:hover {
			color: #5a0f1a;
			cursor: pointer;
		}
		
		.about.active, .cv.active{
			color: #5a0f1a;
		}
		
		.menu-section {
			margin-bottom: 35px;
		}
		
		.menu-section-title {
			font-weight: 600;
			margin-bottom: 10px;
			font-size: 17px;
		}
		
		.menu {
			margin-left: 10px;
			transition: all 0.3s ease;
		}
		
		.menu.collapsed {
			display: none;
		}
		
		.menu a {
				display: block;
				text-decoration: none;
				color: #444;
				font-size: 17px;
				margin: 6px 0;
				cursor: pointer;
				transition: color 0.2s ease;
		}
		
		.menu a:hover {
			font-weight: 600;
			color: #5a0f1a;
		}
		
		.menu-section-title:hover {
			color: #5a0f1a;
			cursor: pointer;
		}
		
		.menu a.active {
			font-weight: 600;
			color: #5a0f1a;
		}
		
		.main {
			margin-left: 260px;
			width:calc(100% - 260px);
			padding: 50px;
		}		
		
		.page-title {
			font-family: "Crimson Text", serif;
			font-size: 54px;
			font-weight: 400;
			text-align: center;
			margin-bottom: 35px
		}
		
		.campaign-grid {
			display: grid;
			grid-template-columns: 2fr 1fr;
			gap: 18px;
			margin-bottom: 28px;
		}
		
		.hero-wrapper{
			display: flex;
			flex-direction: column;
		}
		
		.hero-card {
			overflow: hidden;
			background: white;
		}
		
		.hero-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			transition:transform .5s ease;
		}
		
		.hero-card:hover img {
			transform:scale(1.03);
		}
		
		.hero-caption {
			width: 100%;
			font-family: "Crimson Text", serif;
			padding: 18px 26px 24px 26px;
			text-align: center;
			font-size: clamp(18px, 1.4vw, 25px);
			line-height: 1.4;
			color: #6d6d6d;
			letter-spacing:.15px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow:ellipsis;
		}
		
		.right-stack {
			display: grid;
			flex-direction:column;
			gap: 18px;
		}
		
		.stack-item {
			overflow: hidden;
			background: white;
		}
		
		.stack-item img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			transition:transform .5s ease;
		}
		
		.stack-item:hover img {
			transform:scale(1.03);
		}
		
		.banner-wide {
			overflow: hidden;
			margin-bottom: 18px;
			background: white;
			margin-bottom:18px;
		}
		
		.banner-wide img {
			width:100%;
			height:100%;
			object-fit:cover;
			display:block;
			transition:transform .5s ease;
		}
		
		.banner-wide:hover img {
			transform:scale(1.03);
		}
		
		.bottom-grid {
			display: grid;
			grid-template-columns: 1fr 1.3fr;
			gap: 18px;
		}
		
		.lifestyle {
				overflow: hidden;
				background: white;
		}
		
		.lifestyle img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display:block;
			transition: transform .5s ease;
		}
		
		.lifestyle:hover img {
			transform:scale(1.03);
		}
		
		.right-content {
			display: flex;
			flex-direction: column;
			gap: 18px;
		}
		
		.quote-grid {
			display: grid;
			grid-template-columns: repeat(3,1fr);
			gap: 18px;
		}
		
		.quote-card {
			overflow: hidden;
			background: white;
		}
		
		.quote-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			transition: transform .4s ease;
		}
		
		.quote-card:hover img {
			transform:scale(1.03);
		}
		
		.logo-block {
			//overflow: hidden;
			//background: white;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		
		.logo-block img {
			width: 72%;
			height: 100%;
			object-fit: contain;
			display: block;
			image-rendering: auto;
			backface-visibility: hidden;
			transform: translateZ(0);
			transition: transform .4s ease;
		}
		
		.logo-block:hover img {
			transform:scale(1.03);
		}
		
		.subproject {
			position: relative;
			overflow: hidden;
			height: 200px;
			cursor: pointer;
		}
		
		.overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(255, 255, 255, 0.7);
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: "Crimson Text", serif;
			font-size: 18px;
			color: #6b1e1e;
			opacity: 0;
			transition: opacity 0.3s ease;
			pointer-events: none;
		}
		
		.subproject:hover .overlay { 
			opacity: 1;
		}
		
		.lightbox {
			position: fixed;
			inset: 0;
			background: rgba(255, 255, 255, 0.95);
			display: none;
			justify-content: center;
			align-items: center;
			z-index: 9999;
		}
		
		.lightbox.active {
			display: flex;
		}
		
		.lightbox-img {
			max-width: 80%;
			max-height: 80%;
			object-fit: contain;
		}
		
		.close { 
			position: absolute; 
			top: 20px; 
			right: 30px; 
			font-size: 28px; 
			cursor: pointer; 
		}
		
		.nav { 
			position: absolute; 
			top: 50%; 
			transform: translateY(-50%); 
			font-size: 40px; 
			cursor: pointer; 
			padding: 10px; 
			user-select: none; 
		}
		
		.prev { 
			left: 40px; 
		}
		
		.next { 
			right: 40px; 
		}
	</style>
</head>
